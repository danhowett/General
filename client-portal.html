function addMonths(d, n) {
  const r = new Date(d);
  r.setMonth(r.getMonth() + n);
  return r;
}

function buildCalendar() {
  const events = [];
  // Quarterly IR review meetings
  for (let i = 0; i < 4; i++) {
    const d = addMonths(today, i * 3);
    d.setDate(15);
    events.push({
      id: uid(),
      title: "Quarterly IR Review",
      date: new Date(d),
      type: "meeting",
      color: BRAND.info,
      recurring: "Quarterly",
      desc: "SentinelEdge & client stakeholder review of IR posture, open findings and roadmap.",
    });
  }
  // Tabletop exercise
  const tt = addMonths(today, 2);
  tt.setDate(20);
  events.push({
    id: uid(),
    title: "IR Tabletop Exercise",
    date: tt,
    type: "exercise",
    color: BRAND.accent,
    recurring: "Annual",
    desc: "Simulated ransomware scenario walkthrough with exec and IT teams.",
  });
  // Contract renewal
  const renew = addMonths(today, 10);
  renew.setDate(1);
  events.push({
    id: uid(),
    title: "Contract Renewal Deadline",
    date: renew,
    type: "renewal",
    color: BRAND.warn,
    recurring: "Annual",
    desc: "Annual managed IR retainer renewal. Documents required 30 days prior.",
  });
  // Vulnerability scan
  const vs = addMonths(today, 1);
  vs.setDate(8);
  events.push({
    id: uid(),
    title: "Vulnerability Assessment",
    date: vs,
    type: "assessment",
    color: "#B48EFF",
    recurring: "Bi-Annual",
    desc: "External and internal vulnerability scan. Credential access required.",
  });
  // Policy review
  const pr = addMonths(today, 4);
  pr.setDate(5);
  events.push({
    id: uid(),
    title: "Security Policy Review",
    date: pr,
    type: "review",
    color: BRAND.danger,
    recurring: "Annual",
    desc: "Annual review of client security policies and alignment with IR plan.",
  });
  return events.sort((a, b) => a.date - b.date);
}

const CALENDAR_EVENTS = buildCalendar();

// ── Documents Tab ─────────────────────────────────────────────────────────────
function Documents() {
  const [docs, setDocs] = useState(SAMPLE_DOCS);
  const [dragOver, setDragOver] = useState(false);
  const [uploadMsg, setUploadMsg] = useState("");
  const fileRef = useRef();

  const handleFiles = (files) => {
    const newDocs = Array.from(files).map((f) => ({
      id: uid(),
      name: f.name,
      type: "Pending Classification",
      size: (f.size / 1024 / 1024).toFixed(1) + " MB",
      uploaded: fmtDate(new Date()),
      status: "Submitted – Awaiting Review",
      statusColor: BRAND.info,
    }));
    setDocs((d) => [...d, ...newDocs]);
    setUploadMsg(`${files.length} file(s) submitted successfully. Our team will review shortly.`);
    setTimeout(() => setUploadMsg(""), 4000);
  };

  const docTypes = ["IR Plan", "BCP", "DR Plan", "Network Topology", "Asset Register", "Security Policy", "Other"];

  return (
    <div style={{ padding: "2rem" }}>
      <div style={{ marginBottom: "1.5rem" }}>
        <h2 style={{ color: "#fff", margin: 0, fontFamily: "Georgia, serif", fontWeight: 400, fontSize: "1.4rem" }}>
          Document Repository
        </h2>
        <p style={{ color: BRAND.muted, fontSize: "0.82rem", margin: "0.4rem 0 0" }}>
          Upload your IR, BCP, DR and supporting documents. Submitted files are only accessible to the SentinelEdge review team.
        </p>
      </div>

      {/* Accepted document types */}
      <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "1.5rem" }}>
        {docTypes.map((t) => (
          <span
            key={t}
            style={{
              background: `${BRAND.info}15`,
              border: `1px solid ${BRAND.info}40`,
              color: BRAND.info,
              padding: "0.25rem 0.7rem",
              borderRadius: 20,
              fontSize: "0.72rem",
              fontFamily: "monospace",
            }}
          >
            {t}
          </span>
        ))}
      </div>

      {/* Drop zone */}
      <div
        onClick={() => fileRef.current.click()}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={(e) => {
          e.preventDefault();
          setDragOver(false);
          handleFiles(e.dataTransfer.files);
        }}
        style={{
          border: `2px dashed ${dragOver ? BRAND.accent : BRAND.border}`,
          borderRadius: 8,
          padding: "2.5rem",
          textAlign: "center",
          cursor: "pointer",
          background: dragOver ? `${BRAND.accent}08` : BRAND.card,
          transition: "all 0.2s",
          marginBottom: "1.5rem",
        }}
      >
        <input
          ref={fileRef}
          type="file"
          multiple
          style={{ display: "none" }}
          onChange={(e) => handleFiles(e.target.files)}
        />
        <div style={{ fontSize: "2rem", marginBottom: "0.75rem" }}>⬆</div>
        <div style={{ color: "#fff", fontWeight: 600, marginBottom: "0.4rem" }}>
          Drop files here or click to browse
        </div>
        <div style={{ color: BRAND.muted, fontSize: "0.8rem" }}>
          PDF, DOCX, XLSX, PPTX · Max 50MB per file · All files encrypted in transit
        </div>
        {uploadMsg && (
          <div
            style={{
              marginTop: "1rem",
              background: `${BRAND.accent}18`,
              border: `1px solid ${BRAND.accent}`,
              color: BRAND.accent,
              padding: "0.6rem 1rem",
              borderRadius: 4,
              fontSize: "0.82rem",
            }}
          >
            ✓ {uploadMsg}
          </div>
        )}
      </div>

      {/* Privacy notice */}
      <div
        style={{
          background: `${BRAND.info}10`,
          border: `1px solid ${BRAND.info}40`,
          borderRadius: 6,
          padding: "0.9rem 1.25rem",
          marginBottom: "1.5rem",
          display: "flex",
          gap: "0.75rem",
          alignItems: "flex-start",
          fontSize: "0.8rem",
          color: BRAND.text,
        }}
      >
        <span style={{ color: BRAND.info, fontSize: "1rem" }}>🔒</span>
        <span>
          <strong style={{ color: BRAND.info }}>Secure & Confidential:</strong> Uploaded documents are
          encrypted at rest (AES-256) and are only accessible to authorised SentinelEdge analysts.
          Client organisations cannot view documents submitted by other clients.
        </span>
      </div>

      {/* Documents table */}
      <div
        style={{
          background: BRAND.card,
          border: `1px solid ${BRAND.border}`,
          borderRadius: 8,
          overflow: "hidden",
        }}
      >
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "#0D1F3C", borderBottom: `1px solid ${BRAND.border}` }}>
              {["Document", "Type", "Size", "Uploaded", "Status", ""].map((h) => (
                <th
                  key={h}
                  style={{
                    padding: "0.9rem 1rem",
                    textAlign: "left",
                    color: BRAND.muted,
                    fontSize: "0.72rem",
                    fontFamily: "monospace",
                    letterSpacing: "0.1em",
                    fontWeight: 600,
                  }}
                >
                  {h}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {docs.map((doc) => (
              <tr
                key={doc.id}
                style={{ borderBottom: `1px solid ${BRAND.border}` }}
              >
                <td style={{ padding: "0.9rem 1rem" }}>
                  <div style={{ color: "#fff", fontSize: "0.85rem", fontWeight: 500 }}>
                    📄 {doc.name}
                  </div>
                </td>
                <td style={{ padding: "0.9rem 1rem" }}>
                  <span
                    style={{
                      background: `${BRAND.info}15`,
                      color: BRAND.info,
                      padding: "0.2rem 0.6rem",
                      borderRadius: 4,
                      fontSize: "0.72rem",
                      fontFamily: "monospace",
                    }}
                  >
                    {doc.type}
                  </span>
                </td>
                <td style={{ padding: "0.9rem 1rem", color: BRAND.muted, fontSize: "0.8rem" }}>
                  {doc.size}
                </td>
                <td style={{ padding: "0.9rem 1rem", color: BRAND.muted, fontSize: "0.8rem" }}>
                  {doc.uploaded}
                </td>
                <td style={{ padding: "0.9rem 1rem" }}>
                  <span
                    style={{
                      color: doc.statusColor,
                      fontSize: "0.78rem",
                      fontFamily: "monospace",
                      background: `${doc.statusColor}15`,
                      padding: "0.2rem 0.7rem",
                      borderRadius: 4,
                    }}
                  >
                    {doc.status}
                  </span>
                </td>
                <td style={{ padding: "0.9rem 1rem" }}>
                  <button
                    style={{
                      background: "none",
                      border: `1px solid ${BRAND.border}`,
                      color: BRAND.muted,
                      padding: "0.3rem 0.6rem",
                      borderRadius: 4,
                      cursor: "pointer",
                      fontSize: "0.72rem",
                    }}
                    onClick={() => setDocs((d) => d.filter((x) => x.id !== doc.id))}
                  >
                    Remove
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

  const typeColors = {
    Executive: BRAND.accent,
    "IT Lead": BRAND.info,
    Security: "#B48EFF",
    Legal: BRAND.warn,
    HR: "#FF6B9D",
    Finance: "#FFB300",
  };

  const addContact = () => {
    if (!form.name || !form.email) return;
    setContacts((c) => [
      ...c,
      { ...form, id: uid(), priority: contacts.length + 1 },
    ]);
    setForm({ name: "", title: "", email: "", phone: "", type: "IT Lead", priority: "" });
    setAdding(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  return (
    <div style={{ padding: "2rem" }}>
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          alignItems: "flex-start",
          marginBottom: "1.5rem",
        }}
      >
        <div>
          <h2 style={{ color: "#fff", margin: 0, fontFamily: "Georgia, serif", fontWeight: 400, fontSize: "1.4rem" }}>
            Key IT & Executive Contacts
          </h2>
          <p style={{ color: BRAND.muted, fontSize: "0.82rem", margin: "0.4rem 0 0" }}>
            Contact escalation list used by SentinelEdge during incident response activations.
          </p>
        </div>
        <button
          onClick={() => setAdding(!adding)}
          style={{
            background: BRAND.accent,
            border: "none",
            color: BRAND.dark,
            padding: "0.6rem 1.2rem",
            borderRadius: 4,
            cursor: "pointer",
            fontSize: "0.82rem",
            fontFamily: "monospace",
            fontWeight: 700,
          }}
        >
          + ADD CONTACT
        </button>
      </div>

      {saved && (
        <div
          style={{
            background: `${BRAND.accent}18`,
            border: `1px solid ${BRAND.accent}`,
            color: BRAND.accent,
            padding: "0.75rem 1rem",
            borderRadius: 6,
            fontSize: "0.82rem",
            marginBottom: "1rem",
          }}
        >
          ✓ Contact saved successfully.
        </div>
      )}

      {adding && (
        <div
          style={{
            background: BRAND.card,
            border: `1px solid ${BRAND.accent}`,
            borderRadius: 8,
            padding: "1.5rem",
            marginBottom: "1.5rem",
          }}
        >
          <h4 style={{ color: BRAND.accent, margin: "0 0 1rem", fontFamily: "monospace", fontSize: "0.82rem", letterSpacing: "0.1em" }}>
            NEW CONTACT
          </h4>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.75rem" }}>
            {[
              ["Full Name *", "name", "text"],
              ["Job Title *", "title", "text"],
              ["Email *", "email", "email"],
              ["Phone", "phone", "tel"],
            ].map(([label, key, type]) => (
              <div key={key}>
                <label style={{ color: BRAND.muted, fontSize: "0.72rem", fontFamily: "monospace", display: "block", marginBottom: "0.3rem" }}>
                  {label}
                </label>
                <input
                  type={type}
                  value={form[key]}
                  onChange={(e) => setForm((f) => ({ ...f, [key]: e.target.value }))}
                  style={{
                    width: "100%",
                    background: "#0D1F3C",
                    border: `1px solid ${BRAND.border}`,
                    color: "#fff",
                    padding: "0.6rem 0.75rem",
                    borderRadius: 4,
                    fontSize: "0.85rem",
                    outline: "none",
                    boxSizing: "border-box",
                  }}
                />
              </div>
            ))}
            <div>
              <label style={{ color: BRAND.muted, fontSize: "0.72rem", fontFamily: "monospace", display: "block", marginBottom: "0.3rem" }}>
                Contact Type
              </label>
              <select
                value={form.type}
                onChange={(e) => setForm((f) => ({ ...f, type: e.target.value }))}
                style={{
                  width: "100%",
                  background: "#0D1F3C",
                  border: `1px solid ${BRAND.border}`,
                  color: "#fff",
                  padding: "0.6rem 0.75rem",
                  borderRadius: 4,
                  fontSize: "0.85rem",
                  outline: "none",
                }}
              >
                {Object.keys(typeColors).map((t) => (
                  <option key={t} value={t}>{t}</option>
                ))}
              </select>
            </div>
          </div>
          <div style={{ display: "flex", gap: "0.75rem", marginTop: "1rem" }}>
            <button
              onClick={addContact}
              style={{
                background: BRAND.accent,
                border: "none",
                color: BRAND.dark,
                padding: "0.6rem 1.2rem",
                borderRadius: 4,
                cursor: "pointer",
                fontSize: "0.82rem",
                fontFamily: "monospace",
                fontWeight: 700,
              }}
            >
              SAVE CONTACT
            </button>
            <button
              onClick={() => setAdding(false)}
              style={{
                background: "none",
                border: `1px solid ${BRAND.border}`,
                color: BRAND.muted,
                padding: "0.6rem 1rem",
                borderRadius: 4,
                cursor: "pointer",
                fontSize: "0.82rem",
              }}
            >
              Cancel
            </button>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: "1rem" }}>
        {contacts.map((c) => (
          <div
            key={c.id}
            style={{
              background: BRAND.card,
              border: `1px solid ${BRAND.border}`,
              borderLeft: `3px solid ${typeColors[c.type] || BRAND.muted}`,
              borderRadius: 8,
              padding: "1.25rem",
              position: "relative",
            }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div
                  style={{
                    width: 40,
                    height: 40,
                    borderRadius: 8,
                    background: `${typeColors[c.type] || BRAND.muted}20`,
                    color: typeColors[c.type] || BRAND.muted,
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    fontSize: "1rem",
                    fontWeight: 700,
                    marginBottom: "0.75rem",
                  }}
                >
                  {c.name.charAt(0)}
                </div>
                <div style={{ color: "#fff", fontWeight: 600, fontSize: "0.95rem" }}>{c.name}</div>
                <div style={{ color: BRAND.muted, fontSize: "0.78rem", marginTop: 2 }}>{c.title}</div>
              </div>
              <div style={{ display: "flex", gap: "0.5rem", alignItems: "center" }}>
                <span
                  style={{
                    background: `${typeColors[c.type] || BRAND.muted}20`,
                    color: typeColors[c.type] || BRAND.muted,
                    padding: "0.2rem 0.6rem",
                    borderRadius: 4,
                    fontSize: "0.68rem",
                    fontFamily: "monospace",
                  }}
                >
                  {c.type}
                </span>
                <button
                  onClick={() => setContacts((cc) => cc.filter((x) => x.id !== c.id))}
                  style={{
                    background: "none",
                    border: "none",
                    color: BRAND.muted,
                    cursor: "pointer",
                    fontSize: "0.75rem",
                    padding: "0.2rem",
                  }}
                >
                  ✕
                </button>
              </div>
            </div>
            <div style={{ marginTop: "0.75rem", display: "flex", flexDirection: "column", gap: "0.35rem" }}>
              <div style={{ color: BRAND.text, fontSize: "0.8rem" }}>✉ {c.email}</div>
              {c.phone && <div style={{ color: BRAND.text, fontSize: "0.8rem" }}>☎ {c.phone}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Calendar Tab ──────────────────────────────────────────────────────────────
function CalendarTab() {
  const [selected, setSelected] = useState(null);

  const typeIcon = {
    meeting: "◷",
    exercise: "⬡",
    renewal: "⟳",
    assessment: "◈",
    review: "≡",
  };

  return (
    <div style={{ padding: "2rem" }}>
      <div style={{ marginBottom: "1.5rem" }}>
        <h2 style={{ color: "#fff", margin: 0, fontFamily: "Georgia, serif", fontWeight: 400, fontSize: "1.4rem" }}>
          Engagement Calendar
        </h2>
        <p style={{ color: BRAND.muted, fontSize: "0.82rem", margin: "0.4rem 0 0" }}>
          All scheduled meetings, assessments, and renewal milestones with SentinelEdge.
        </p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 340px", gap: "1.5rem" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
          {CALENDAR_EVENTS.map((ev) => {
            const daysUntil = Math.ceil((ev.date - today) / 86400000);
            const isPast = daysUntil < 0;
            return (
              <div
                key={ev.id}
                onClick={() => setSelected(ev)}
                style={{
                  background: selected?.id === ev.id ? `${ev.color}18` : BRAND.card,
                  border: `1px solid ${selected?.id === ev.id ? ev.color : BRAND.border}`,
                  borderLeft: `4px solid ${ev.color}`,
                  borderRadius: 8,
                  padding: "1rem 1.25rem",
                  cursor: "pointer",
                  display: "flex",
                  gap: "1rem",
                  alignItems: "center",
                  opacity: isPast ? 0.5 : 1,
                  transition: "all 0.15s",
                }}
              >
                <div style={{ textAlign: "center", minWidth: 52 }}>
                  <div style={{ color: ev.color, fontSize: "1.2rem", fontFamily: "monospace", fontWeight: 700 }}>
                    {ev.date.getDate()}
                  </div>
                  <div style={{ color: BRAND.muted, fontSize: "0.68rem", fontFamily: "monospace", textTransform: "uppercase" }}>
                    {ev.date.toLocaleString("en-GB", { month: "short" })} {ev.date.getFullYear()}
                  </div>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: "#fff", fontWeight: 600, fontSize: "0.9rem", display: "flex", alignItems: "center", gap: "0.5rem" }}>
                    <span style={{ color: ev.color }}>{typeIcon[ev.type]}</span>
                    {ev.title}
                  </div>
                  <div style={{ color: BRAND.muted, fontSize: "0.75rem", marginTop: 2 }}>{ev.desc}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <span
                    style={{
                      background: `${ev.color}18`,
                      color: ev.color,
                      padding: "0.2rem 0.6rem",
                      borderRadius: 4,
                      fontSize: "0.7rem",
                      fontFamily: "monospace",
                      display: "block",
                      marginBottom: "0.35rem",
                    }}
                  >
                    {ev.recurring}
                  </span>
                  <span style={{ color: BRAND.muted, fontSize: "0.7rem" }}>
                    {isPast ? "Completed" : `in ${daysUntil} days`}
                  </span>
                </div>
              </div>
            );
          })}
        </div>

        <div>
          {selected ? (
            <div
              style={{
                background: BRAND.card,
                border: `1px solid ${selected.color}`,
                borderRadius: 8,
                padding: "1.5rem",
                position: "sticky",
                top: 80,
              }}
            >
              <div style={{ color: selected.color, fontSize: "0.72rem", fontFamily: "monospace", letterSpacing: "0.1em", marginBottom: "0.5rem" }}>
                {selected.type.toUpperCase()} · {selected.recurring.toUpperCase()}
              </div>
              <h3 style={{ color: "#fff", margin: "0 0 0.75rem", fontFamily: "Georgia, serif", fontWeight: 400 }}>
                {selected.title}
              </h3>
              <div style={{ color: selected.color, fontFamily: "monospace", fontWeight: 700, marginBottom: "1rem" }}>
                {fmtDate(selected.date)}
              </div>
              <p style={{ color: BRAND.text, fontSize: "0.85rem", lineHeight: 1.7, margin: "0 0 1rem" }}>
                {selected.desc}
              </p>
              <div
                style={{
                  background: "#0D1F3C",
                  borderRadius: 6,
                  padding: "0.75rem",
                  fontSize: "0.78rem",
                  color: BRAND.muted,
                }}
              >
                <strong style={{ color: BRAND.text }}>Next occurrence:</strong>{" "}
                {fmtDate(
                  selected.recurring === "Quarterly"
                    ? addMonths(selected.date, 3)
                    : selected.recurring === "Bi-Annual"
                    ? addMonths(selected.date, 6)
                    : addMonths(selected.date, 12)
                )}
              </div>
            </div>
          ) : (
            <div
              style={{
                background: BRAND.card,
                border: `1px solid ${BRAND.border}`,
                borderRadius: 8,
                padding: "2rem",
                textAlign: "center",
                color: BRAND.muted,
                fontSize: "0.85rem",
                position: "sticky",
                top: 80,
              }}
            >
              <div style={{ fontSize: "2rem", marginBottom: "0.75rem" }}>◷</div>
              Select an event to view details
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Forms Tab ─────────────────────────────────────────────────────────────────
function Forms() {
  const [activeForm, setActiveForm] = useState(null);
  const [submitted, setSubmitted] = useState({});
  const [formData, setFormData] = useState({});

  const formDefs = [
    {
      id: "ir-intake",
      title: "IR Incident Intake Form",
      desc: "Report a live or suspected security incident for immediate triage.",
      icon: "🚨",
      color: BRAND.danger,
      fields: [
        { key: "reporter", label: "Reporter Name", type: "text", required: true },
        { key: "reporterTitle", label: "Job Title", type: "text", required: true },
        { key: "incidentDate", label: "Incident Detected (Date/Time)", type: "datetime-local", required: true },
        { key: "incidentType", label: "Incident Type", type: "select", options: ["Ransomware", "Data Breach", "Phishing / BEC", "DDoS", "Insider Threat", "Unknown / Other"], required: true },
        { key: "affectedSystems", label: "Affected Systems / Assets", type: "textarea", required: true },
        { key: "severity", label: "Perceived Severity", type: "select", options: ["Critical – Business Impacting", "High – Significant Risk", "Medium – Limited Impact", "Low – Precautionary"], required: true },
        { key: "description", label: "Incident Description", type: "textarea", required: true },
        { key: "containment", label: "Containment Steps Taken (if any)", type: "textarea" },
        { key: "contactPhone", label: "Best Contact Phone", type: "tel", required: true },
      ],
    },
    {
      id: "asset-register",
      title: "Critical Asset Register",
      desc: "Define your critical IT assets to inform IR prioritisation.",
      icon: "🖥",
      color: BRAND.info,
      fields: [
        { key: "assetName", label: "Asset Name", type: "text", required: true },
        { key: "assetType", label: "Asset Type", type: "select", options: ["Server", "Network Device", "Endpoint", "Cloud Service", "Database", "Application", "Other"] },
        { key: "owner", label: "Business Owner", type: "text", required: true },
        { key: "criticality", label: "Business Criticality", type: "select", options: ["Tier 1 – Mission Critical", "Tier 2 – Important", "Tier 3 – Standard"], required: true },
        { key: "location", label: "Location / Data Centre", type: "text" },
        { key: "ipRange", label: "IP Address / Range", type: "text" },
        { key: "os", label: "OS / Platform", type: "text" },
        { key: "notes", label: "Additional Notes", type: "textarea" },
      ],
    },
    {
      id: "tabletop-signup",
      title: "Tabletop Exercise Registration",
      desc: "Register attendees for the upcoming IR tabletop simulation.",
      icon: "🎯",
      color: BRAND.accent,
      fields: [
        { key: "attendeeName", label: "Attendee Full Name", type: "text", required: true },
        { key: "role", label: "Role / Department", type: "text", required: true },
        { key: "email", label: "Email Address", type: "email", required: true },
        { key: "exerciseDate", label: "Preferred Session", type: "select", options: ["Session A – Morning (09:00–12:00)", "Session B – Afternoon (13:00–16:00)"] },
        { key: "priorExperience", label: "Prior IR Tabletop Experience?", type: "select", options: ["Yes – multiple exercises", "Yes – one exercise", "No – first time"] },
        { key: "dietaryReqs", label: "Dietary Requirements (if in-person)", type: "text" },
        { key: "notes", label: "Additional Notes", type: "textarea" },
      ],
    },
    {
      id: "change-contact",
      title: "Contact Update Request",
      desc: "Notify SentinelEdge of changes to your key contact list.",
      icon: "👤",
      color: "#B48EFF",
      fields: [
        { key: "requestedBy", label: "Requested By", type: "text", required: true },
        { key: "changeType", label: "Change Type", type: "select", options: ["Add New Contact", "Update Existing Contact", "Remove Contact"], required: true },
        { key: "contactName", label: "Contact Full Name", type: "text", required: true },
        { key: "contactRole", label: "Contact Role", type: "text" },
        { key: "contactEmail", label: "Contact Email", type: "email" },
        { key: "contactPhone", label: "Contact Phone", type: "tel" },
        { key: "effectiveDate", label: "Effective Date", type: "date" },
        { key: "reason", label: "Reason for Change", type: "textarea" },
      ],
    },
  ];

  const renderField = (field) => {
    const val = (formData[activeForm] || {})[field.key] || "";
    const set = (v) =>
      setFormData((fd) => ({
        ...fd,
        [activeForm]: { ...(fd[activeForm] || {}), [field.key]: v },
      }));

    const inputStyle = {
      width: "100%",
      background: "#0D1F3C",
      border: `1px solid ${BRAND.border}`,
      color: "#fff",
      padding: "0.6rem 0.75rem",
      borderRadius: 4,
      fontSize: "0.85rem",
      outline: "none",
      boxSizing: "border-box",
      fontFamily: "inherit",
    };

    if (field.type === "select")
      return (
        <select value={val} onChange={(e) => set(e.target.value)} style={inputStyle}>
          <option value="">Select…</option>
          {field.options.map((o) => <option key={o} value={o}>{o}</option>)}
        </select>
      );
    if (field.type === "textarea")
      return (
        <textarea
          value={val}
          onChange={(e) => set(e.target.value)}
          rows={3}
          style={{ ...inputStyle, resize: "vertical" }}
        />
      );
    return (
      <input
        type={field.type}
        value={val}
        onChange={(e) => set(e.target.value)}
        style={inputStyle}
      />
    );
  };

  const handleSubmit = (formId) => {
    setSubmitted((s) => ({ ...s, [formId]: true }));
    setActiveForm(null);
    setTimeout(() => setSubmitted((s) => ({ ...s, [formId]: false })), 5000);
  };

  if (activeForm) {
    const def = formDefs.find((f) => f.id === activeForm);
    return (
      <div style={{ padding: "2rem", maxWidth: 700 }}>
        <button
          onClick={() => setActiveForm(null)}
          style={{
            background: "none",
            border: "none",
            color: BRAND.muted,
            cursor: "pointer",
            fontSize: "0.82rem",
            marginBottom: "1rem",
            display: "flex",
            alignItems: "center",
            gap: "0.4rem",
            padding: 0,
          }}
        >
          ← Back to Forms
        </button>
        <div style={{ display: "flex", alignItems: "center", gap: "1rem", marginBottom: "1.5rem" }}>
          <div style={{ fontSize: "2rem" }}>{def.icon}</div>
          <div>
            <h2 style={{ color: "#fff", margin: 0, fontFamily: "Georgia, serif", fontWeight: 400, fontSize: "1.4rem" }}>
              {def.title}
            </h2>
            <p style={{ color: BRAND.muted, margin: "0.3rem 0 0", fontSize: "0.82rem" }}>{def.desc}</p>
          </div>
        </div>
        <div
          style={{
            background: BRAND.card,
            border: `1px solid ${BRAND.border}`,
            borderRadius: 8,
            padding: "1.75rem",
          }}
        >
          <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
            {def.fields.map((f) => (
              <div key={f.key}>
                <label
                  style={{
                    color: BRAND.muted,
                    fontSize: "0.72rem",
                    fontFamily: "monospace",
                    display: "block",
                    marginBottom: "0.35rem",
                    letterSpacing: "0.05em",
                  }}
                >
                  {f.label.toUpperCase()}
                  {f.required && <span style={{ color: def.color }}> *</span>}
                </label>
                {renderField(f)}
              </div>
            ))}
          </div>
          <div style={{ marginTop: "1.5rem", display: "flex", gap: "0.75rem" }}>
            <button
              onClick={() => handleSubmit(activeForm)}
              style={{
                background: def.color,
                border: "none",
                color: def.color === BRAND.accent ? BRAND.dark : "#fff",
                padding: "0.75rem 1.75rem",
                borderRadius: 4,
                cursor: "pointer",
                fontSize: "0.85rem",
                fontFamily: "monospace",
                fontWeight: 700,
                letterSpacing: "0.08em",
              }}
            >
              SUBMIT FORM
            </button>
            <button
              onClick={() => setActiveForm(null)}
              style={{
                background: "none",
                border: `1px solid ${BRAND.border}`,
                color: BRAND.muted,
                padding: "0.75rem 1rem",
                borderRadius: 4,
                cursor: "pointer",
                fontSize: "0.85rem",
              }}
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: "2rem" }}>
      <div style={{ marginBottom: "1.5rem" }}>
        <h2 style={{ color: "#fff", margin: 0, fontFamily: "Georgia, serif", fontWeight: 400, fontSize: "1.4rem" }}>
          Forms & Submissions
        </h2>
        <p style={{ color: BRAND.muted, fontSize: "0.82rem", margin: "0.4rem 0 0" }}>
          Submit structured information to the SentinelEdge team using the forms below.
        </p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1rem" }}>
        {formDefs.map((f) => (
          <div
            key={f.id}
            style={{
              background: BRAND.card,
              border: `1px solid ${submitted[f.id] ? f.color : BRAND.border}`,
              borderTop: `3px solid ${f.color}`,
              borderRadius: 8,
              padding: "1.5rem",
            }}
          >
            <div style={{ fontSize: "1.75rem", marginBottom: "0.75rem" }}>{f.icon}</div>
            <h3 style={{ color: "#fff", margin: "0 0 0.4rem", fontSize: "1rem" }}>{f.title}</h3>
            <p style={{ color: BRAND.muted, fontSize: "0.8rem", margin: "0 0 1.25rem", lineHeight: 1.6 }}>{f.desc}</p>
            {submitted[f.id] ? (
              <div style={{ color: BRAND.accent, fontSize: "0.82rem", fontFamily: "monospace" }}>
                ✓ Submitted – SentinelEdge team notified
              </div>
            ) : (
              <button
                onClick={() => setActiveForm(f.id)}
                style={{
                  background: `${f.color}18`,
                  border: `1px solid ${f.color}`,
                  color: f.color,
                  padding: "0.6rem 1.2rem",
                  borderRadius: 4,
                  cursor: "pointer",
                  fontSize: "0.8rem",
                  fontFamily: "monospace",
                  fontWeight: 600,
                  letterSpacing: "0.06em",
                }}
              >
                OPEN FORM →
              </button>
            )}
          </div>
        ))}
      </div>

      {/* Downloadable template section */}
      <div style={{ marginTop: "2rem" }}>
        <h3 style={{ color: "#fff", fontFamily: "monospace", fontSize: "0.85rem", letterSpacing: "0.1em", marginBottom: "1rem" }}>
          ⬇ DOWNLOADABLE TEMPLATES
        </h3>

// ── Contact Us Tab ────────────────────────────────────────────────────────────
function ContactUs() {
  const [mode, setMode] = useState("chat");
  const [messages, setMessages] = useState([
    {
      id: "m0",
      from: "SentinelEdge",
      text: "Hello! Welcome to the SentinelEdge secure client portal. How can we help you today? For urgent incidents, please call our IR Hotline: +44 800 000 9911.",
      time: "Just now",
    },
  ]);
  const [input, setInput] = useState("");
  const [emailForm, setEmailForm] = useState({ subject: "", priority: "Normal", body: "" });
  const [emailSent, setEmailSent] = useState(false);
  const chatEnd = useRef();

  useEffect(() => {
    chatEnd.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const sendMsg = () => {
    if (!input.trim()) return;
    const userMsg = { id: uid(), from: "You", text: input.trim(), time: "Just now" };
    setMessages((m) => [...m, userMsg]);
    setInput("");
    setTimeout(() => {
      setMessages((m) => [
        ...m,
        {
          id: uid(),
          from: "SentinelEdge",
          text: "Thanks for your message. A member of our team will respond within 2 hours during business hours. For P1 incidents, please call our hotline immediately.",
          time: "Just now",
        },
      ]);
    }, 1200);
  };

  const sendEmail = () => {
    if (!emailForm.subject || !emailForm.body) return;
    setEmailSent(true);
    setTimeout(() => setEmailSent(false), 5000);
    setEmailForm({ subject: "", priority: "Normal", body: "" });
  };

  return (
    <div style={{ padding: "2rem" }}>
      <div style={{ marginBottom: "1.5rem" }}>
        <h2 style={{ color: "#fff", margin: 0, fontFamily: "Georgia, serif", fontWeight: 400, fontSize: "1.4rem" }}>
          Contact SentinelEdge
        </h2>
        <p style={{ color: BRAND.muted, fontSize: "0.82rem", margin: "0.4rem 0 0" }}>
          Reach our team via live chat or secure email. For emergencies, call our 24/7 hotline.
        </p>
      </div>

      {/* Emergency banner */}
      <div
        style={{
          background: `${BRAND.danger}15`,
          border: `1px solid ${BRAND.danger}`,
          borderRadius: 8,
          padding: "1rem 1.5rem",
          marginBottom: "1.5rem",
          display: "flex",
          alignItems: "center",
          gap: "1rem",
        }}
      >
        <span style={{ fontSize: "1.5rem" }}>🚨</span>
        <div>
          <div style={{ color: BRAND.danger, fontWeight: 700, fontSize: "0.9rem" }}>
            Active Incident? Call immediately:
          </div>
          <div style={{ color: "#fff", fontFamily: "monospace", fontSize: "1.1rem", fontWeight: 700, letterSpacing: "0.1em" }}>
            +44 800 000 9911
          </div>
          <div style={{ color: BRAND.muted, fontSize: "0.75rem" }}>24/7 · IR Hotline · Average response: &lt; 15 minutes</div>
        </div>
      </div>

      {/* Mode toggle */}
      <div
        style={{
          display: "flex",
          gap: 0,
          marginBottom: "1.5rem",
          background: BRAND.card,
          border: `1px solid ${BRAND.border}`,
          borderRadius: 6,
          width: "fit-content",
        }}
      >
        {["chat", "email"].map((m) => (
          <button
            key={m}
            onClick={() => setMode(m)}
            style={{
              background: mode === m ? BRAND.accent : "none",
              border: "none",
              color: mode === m ? BRAND.dark : BRAND.muted,
              padding: "0.65rem 1.5rem",
              cursor: "pointer",
              fontSize: "0.82rem",
              fontFamily: "monospace",
              fontWeight: mode === m ? 700 : 400,
              borderRadius: 5,
              letterSpacing: "0.06em",
              transition: "all 0.15s",
            }}
          >
            {m === "chat" ? "💬 LIVE CHAT" : "✉ SECURE EMAIL"}
          </button>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 280px", gap: "1.5rem" }}>
        {mode === "chat" ? (
          <div
            style={{
              background: BRAND.card,
              border: `1px solid ${BRAND.border}`,
              borderRadius: 8,
              display: "flex",
              flexDirection: "column",
              height: 480,
            }}
          >
            {/* Header */}
            <div
              style={{
                padding: "1rem 1.25rem",
                borderBottom: `1px solid ${BRAND.border}`,
                display: "flex",
                alignItems: "center",
                gap: "0.75rem",
              }}
            >
              <div
                style={{
                  width: 32,
                  height: 32,
                  borderRadius: 8,
                  background: `${BRAND.accent}20`,
                  color: BRAND.accent,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: "1rem",
                }}
              >
                ⬡
              </div>
              <div>
                <div style={{ color: "#fff", fontSize: "0.88rem", fontWeight: 600 }}>SentinelEdge Team</div>
                <div style={{ color: BRAND.accent, fontSize: "0.7rem", display: "flex", alignItems: "center", gap: "0.3rem" }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: BRAND.accent }} />
                  Online · Typical reply: &lt; 2 hours
                </div>
              </div>
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflowY: "auto", padding: "1rem", display: "flex", flexDirection: "column", gap: "0.75rem" }}>
              {messages.map((msg) => (
                <div
                  key={msg.id}
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    alignItems: msg.from === "You" ? "flex-end" : "flex-start",
                  }}
                >
                  <div style={{ color: BRAND.muted, fontSize: "0.68rem", marginBottom: "0.25rem", fontFamily: "monospace" }}>
                    {msg.from} · {msg.time}
                  </div>
                  <div
                    style={{
                      background: msg.from === "You" ? `${BRAND.accent}20` : "#0D1F3C",
                      border: `1px solid ${msg.from === "You" ? BRAND.accent + "40" : BRAND.border}`,
                      color: BRAND.text,
                      padding: "0.75rem 1rem",
                      borderRadius: msg.from === "You" ? "12px 12px 2px 12px" : "12px 12px 12px 2px",
                      maxWidth: "80%",
                      fontSize: "0.85rem",
                      lineHeight: 1.6,
                    }}
                  >
                    {msg.text}
                  </div>
                </div>
              ))}
              <div ref={chatEnd} />
            </div>

            {/* Input */}
            <div
              style={{
                padding: "1rem",
                borderTop: `1px solid ${BRAND.border}`,
                display: "flex",
                gap: "0.5rem",
              }}
            >
              <input
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && sendMsg()}
                placeholder="Type your message…"
                style={{
                  flex: 1,
                  background: "#0D1F3C",
                  border: `1px solid ${BRAND.border}`,
                  color: "#fff",
                  padding: "0.6rem 0.9rem",
                  borderRadius: 4,
                  fontSize: "0.85rem",
                  outline: "none",
                }}
              />
              <button
                onClick={sendMsg}
                style={{
                  background: BRAND.accent,
                  border: "none",
                  color: BRAND.dark,
                  padding: "0.6rem 1rem",
                  borderRadius: 4,
                  cursor: "pointer",
                  fontWeight: 700,
                  fontSize: "0.85rem",
                }}
              >
                ➤
              </button>
            </div>
          </div>
        ) : (
          <div
            style={{
              background: BRAND.card,
              border: `1px solid ${BRAND.border}`,
              borderRadius: 8,
              padding: "1.5rem",
            }}
          >
            {emailSent ? (
              <div
                style={{
                  textAlign: "center",
                  padding: "3rem 1rem",
                  color: BRAND.accent,
                }}
              >
                <div style={{ fontSize: "3rem", marginBottom: "1rem" }}>✓</div>
                <div style={{ fontWeight: 700, fontSize: "1.1rem", marginBottom: "0.5rem" }}>Message Sent Securely</div>
                <div style={{ color: BRAND.muted, fontSize: "0.85rem" }}>
                  Our team will respond within 2 business hours.
                </div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
                <div>
                  <label style={{ color: BRAND.muted, fontSize: "0.72rem", fontFamily: "monospace", display: "block", marginBottom: "0.35rem" }}>
                    SUBJECT *
                  </label>
                  <input
                    value={emailForm.subject}
                    onChange={(e) => setEmailForm((f) => ({ ...f, subject: e.target.value }))}
                    style={{
                      width: "100%",
                      background: "#0D1F3C",
                      border: `1px solid ${BRAND.border}`,
                      color: "#fff",
                      padding: "0.6rem 0.75rem",
                      borderRadius: 4,
                      fontSize: "0.85rem",
                      outline: "none",
                      boxSizing: "border-box",
                    }}
                  />
                </div>
                <div>
                  <label style={{ color: BRAND.muted, fontSize: "0.72rem", fontFamily: "monospace", display: "block", marginBottom: "0.35rem" }}>
                    PRIORITY
                  </label>
                  <select
                    value={emailForm.priority}
                    onChange={(e) => setEmailForm((f) => ({ ...f, priority: e.target.value }))}
                    style={{
                      width: "100%",
                      background: "#0D1F3C",
                      border: `1px solid ${BRAND.border}`,
                      color: "#fff",
                      padding: "0.6rem 0.75rem",
                      borderRadius: 4,
                      fontSize: "0.85rem",
                      outline: "none",
                    }}
                  >
                    {["Normal", "High", "Urgent"].map((o) => <option key={o}>{o}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{ color: BRAND.muted, fontSize: "0.72rem", fontFamily: "monospace", display: "block", marginBottom: "0.35rem" }}>
                    MESSAGE *
                  </label>
                  <textarea
                    value={emailForm.body}
                    onChange={(e) => setEmailForm((f) => ({ ...f, body: e.target.value }))}
                    rows={8}
                    style={{
                      width: "100%",
                      background: "#0D1F3C",
                      border: `1px solid ${BRAND.border}`,
                      color: "#fff",
                      padding: "0.6rem 0.75rem",
                      borderRadius: 4,
                      fontSize: "0.85rem",
                      outline: "none",
                      boxSizing: "border-box",
                      resize: "vertical",
                      fontFamily: "inherit",
                    }}
                  />
                </div>
                <button
                  onClick={sendEmail}
                  style={{
                    background: BRAND.accent,
                    border: "none",
                    color: BRAND.dark,
                    padding: "0.75rem",
                    borderRadius: 4,
                    cursor: "pointer",
                    fontSize: "0.88rem",
                    fontFamily: "monospace",
                    fontWeight: 700,
                    letterSpacing: "0.08em",
                  }}
                >
                  SEND SECURE MESSAGE →
                </button>
              </div>
            )}
          </div>
        )}

        {/* Contact info sidebar */}
        <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
          {[
            { label: "IR Hotline (24/7)", value: "+44 800 000 9911", icon: "🚨", color: BRAND.danger },
            { label: "General Enquiries", value: "hello@sentineledge.io", icon: "✉", color: BRAND.info },
            { label: "SOC Team", value: "soc@sentineledge.io", icon: "⬡", color: BRAND.accent },
            { label: "Account Manager", value: "R. Thompson", icon: "👤", color: "#B48EFF" },
            { label: "Office Hours", value: "Mon–Fri 08:00–18:00 GMT", icon: "◷", color: BRAND.muted },
          ].map((c) => (
            <div
              key={c.label}
              style={{
                background: BRAND.card,
                border: `1px solid ${BRAND.border}`,
                borderRadius: 8,
                padding: "1rem",
                display: "flex",
                gap: "0.75rem",
                alignItems: "center",
              }}
            >
              <div
                style={{
                  width: 32,
                  height: 32,
                  borderRadius: 6,
                  background: `${c.color}20`,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: "0.9rem",
                  flexShrink: 0,
                }}
              >
                {c.icon}
              </div>
              <div>
                <div style={{ color: BRAND.muted, fontSize: "0.68rem", fontFamily: "monospace", marginBottom: 2 }}>{c.label}</div>
                <div style={{ color: "#fff", fontSize: "0.82rem", fontWeight: 600 }}>{c.value}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState("overview");

  const renderTab = () => {
    switch (active) {
      case "overview": return <Overview setActive={setActive} />;
      case "documents": return <Documents />;
      case "contacts": return <Contacts />;
      case "calendar": return <CalendarTab />;
      case "forms": return <Forms />;
      case "contact-us": return <ContactUs />;
      default: return null;
    }
  };

  return (
    <div
      style={{
        minHeight: "100vh",
        background: BRAND.dark,
        fontFamily: "'Segoe UI', system-ui, sans-serif",
        color: BRAND.text,
      }}
    >
      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.3; }
        }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: ${BRAND.dark}; }
        ::-webkit-scrollbar-thumb { background: ${BRAND.border}; border-radius: 3px; }
        select option { background: #0D1F3C; color: #fff; }
      `}</style>
      <NavBar active={active} setActive={setActive} />
      <div style={{ maxWidth: 1200, margin: "0 auto" }}>{renderTab()}</div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
