<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threat Actor Profiles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #58a6ff;

    --nation: #e74c3c;
    --nation-bg: rgba(231,76,60,0.12);
    --nation-border: rgba(231,76,60,0.35);

    --criminal: #f39c12;
    --criminal-bg: rgba(243,156,18,0.12);
    --criminal-border: rgba(243,156,18,0.35);

    --hacktivist: #9b59b6;
    --hacktivist-bg: rgba(155,89,182,0.12);
    --hacktivist-border: rgba(155,89,182,0.35);

    --insider: #e91e63;
    --insider-bg: rgba(233,30,99,0.12);
    --insider-border: rgba(233,30,99,0.35);

    --competitor: #00bcd4;
    --competitor-bg: rgba(0,188,212,0.12);
    --competitor-border: rgba(0,188,212,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  /* ── HEADER ── */
  .page-header {
    max-width: 1200px;
    margin: 0 auto 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .page-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
  .page-header .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 5px; }

  /* ── ACTOR TYPE LEGEND ── */
  .type-legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

  .type-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity 0.2s;
  }

  .type-chip.nation-state { background: var(--nation-bg); color: var(--nation); border-color: var(--nation-border); }
  .type-chip.criminal     { background: var(--criminal-bg); color: var(--criminal); border-color: var(--criminal-border); }
  .type-chip.hacktivist   { background: var(--hacktivist-bg); color: var(--hacktivist); border-color: var(--hacktivist-border); }
  .type-chip.insider      { background: var(--insider-bg); color: var(--insider); border-color: var(--insider-border); }
  .type-chip.competitor   { background: var(--competitor-bg); color: var(--competitor); border-color: var(--competitor-border); }

  /* ── WRAP ── */
  .wrap { max-width: 1200px; margin: 0 auto; }

  /* ── SECTOR SWITCHER ── */
  .sector-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .sector-btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .sector-btn:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }

  .sector-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
    font-weight: 700;
  }

  .sector-btn .s-icon { font-size: 15px; }

  /* ── SECTOR HEADER ── */
  .sector-overview {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: start;
    margin-bottom: 28px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .sector-overview h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .sector-overview p  { font-size: 13px; color: var(--muted); line-height: 1.55; max-width: 700px; }

  .threat-level-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 20px;
    border-radius: 8px;
    min-width: 110px;
    text-align: center;
  }

  .threat-level-badge .tl-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .threat-level-badge .tl-value {
    font-size: 18px;
    font-weight: 700;
  }

  .tl-critical { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #ff7b72; }
  .tl-high     { background: rgba(243,156,18,0.15); border: 1px solid rgba(243,156,18,0.4); color: #f0883e; }
  .tl-medium   { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); color: #3fb950; }

  /* ── ACTOR GRID ── */
  .actor-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  @media (max-width: 600px) { .actor-grid { grid-template-columns: 1fr; } }

  /* ── ACTOR CARD ── */
  .actor-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .actor-card:hover { border-color: var(--actor-color); box-shadow: 0 4px 24px rgba(0,0,0,0.4); }

  .actor-card-header {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    border-left: 4px solid var(--actor-color);
  }

  .actor-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .actor-alias { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); }

  .actor-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }

  .actor-type-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 500;
  }

  .sophistication {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .soph-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1px; }

  .soph-pips { display: flex; gap: 3px; }

  .pip {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    background: var(--border);
  }

  .pip.filled { background: var(--actor-color); }

  .actor-card-body {
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .actor-section h4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }

  .actor-section ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }

  .actor-section ul li {
    font-size: 12px;
    color: rgba(230,237,243,0.85);
    display: flex;
    gap: 6px;
    align-items: flex-start;
    line-height: 1.35;
  }

  .actor-section ul li::before {
    content: '›';
    color: var(--actor-color);
    font-size: 13px;
    flex-shrink: 0;
    margin-top: -1px;
  }

  .actor-card-footer {
    padding: 10px 18px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .actor-card-footer .footer-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .actor-card-footer .footer-text {
    font-size: 11.5px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.4;
  }

  .motivation-bar {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .motive-tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .motive-tag.primary {
    background: color-mix(in srgb, var(--actor-color) 12%, transparent);
    border-color: color-mix(in srgb, var(--actor-color) 35%, transparent);
    color: var(--actor-color);
    font-weight: 600;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* ── FOOTER ── */
  .page-footer {
    max-width: 1200px;
    margin: 48px auto 0;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .actor-card { animation: fadeIn 0.3s ease forwards; }
</style>
</head>

// ── RENDER ──────────────────────────────────────────────────

let activeSector = sectors[0].id;

function renderSectorBar() {
  const bar = document.getElementById('sectorBar');
  bar.innerHTML = sectors.map(s => `
    <button class="sector-btn ${s.id === activeSector ? 'active' : ''}" data-id="${s.id}">
      <span class="s-icon">${s.icon}</span>${s.name}
    </button>
  `).join('');

  bar.querySelectorAll('.sector-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSector = btn.dataset.id;
      renderSectorBar();
      renderSectorContent();
    });
  });
}

function sophPips(level) {
  return Array.from({length: 5}, (_, i) =>
    `<div class="pip ${i < level ? 'filled' : ''}"></div>`
  ).join('');
}

function sophLabel(level) {
  return ['', 'Basic', 'Low', 'Moderate', 'Advanced', 'Expert'][level];
}

function renderSectorContent() {
  const sector = sectors.find(s => s.id === activeSector);
  const content = document.getElementById('sectorContent');

  const tlClass = { critical: 'tl-critical', high: 'tl-high', medium: 'tl-medium' }[sector.threatLevel];
  const tlLabel = { critical: 'CRITICAL', high: 'HIGH', medium: 'MEDIUM' }[sector.threatLevel];

  content.innerHTML = `
    <div class="sector-overview">
      <div>
        <h2>${sector.icon} ${sector.name} — Threat Landscape</h2>
        <p>${sector.summary}</p>
      </div>
      <div class="threat-level-badge ${tlClass}">
        <div class="tl-label">Threat Level</div>
        <div class="tl-value">${tlLabel}</div>
      </div>
    </div>

    <div class="section-label">Threat Actor Profiles — ${sector.actors.length} identified actors</div>

    <div class="actor-grid">
      ${sector.actors.map((actor, i) => {
        const color = ACTOR_COLORS[actor.type];
        return `
        <div class="actor-card" style="--actor-color:${color}; animation-delay:${i * 0.07}s">
          <div class="actor-card-header" style="border-left-color:${color}">
            <div>
              <div class="actor-name">${actor.name}</div>
              <div class="actor-alias">${actor.alias}</div>
            </div>
            <div class="actor-header-right">
              <span class="actor-type-badge ${actor.type}" style="background:${color}1a; color:${color}; border:1px solid ${color}55">
                ${actor.type.replace('-', ' ')}
              </span>
              <div class="sophistication">
                <span class="soph-label">SOPHIST.</span>
                <div class="soph-pips">${sophPips(actor.sophistication)}</div>
                <span class="soph-label">${sophLabel(actor.sophistication)}</span>
              </div>
            </div>
          </div>
          <div class="actor-card-body">
            <div class="motivation-bar">
              ${actor.motivations.map((m, mi) => `<span class="motive-tag ${mi === 0 ? 'primary' : ''}" style="${mi===0?'--actor-color:'+color:''}">${m}</span>`).join('')}
            </div>
            <div class="actor-section">
              <h4>Tactics, Techniques & Procedures</h4>
              <ul>${actor.ttps.map(t => `<li>${t}</li>`).join('')}</ul>
            </div>
            <div class="actor-section">
              <h4>Target Assets</h4>
              <ul>${actor.targets.map(t => `<li>${t}</li>`).join('')}</ul>
            </div>
          </div>
          <div class="actor-card-footer">
            <span class="footer-label">Example</span>
            <span class="footer-text">${actor.example}</span>
          </div>
        </div>
        `;
      }).join('')}
    </div>
  `;
}

renderSectorBar();
renderSectorContent();
</script>
